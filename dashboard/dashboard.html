<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div id="loader">
    <div class="loader-ring"></div>
    <h2>NEXORA</h2>
</div>

<div class="background"></div>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">

            <img src="assets/logo.png">

            <h2>NEXORA</h2>

        </div>

        <nav>

            <button data-page="dashboard">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </button>

            <button data-page="server">
                <i class="fa-solid fa-server"></i>
                Server
            </button>

            <button data-page="moderation">
                <i class="fa-solid fa-shield-halved"></i>
                Moderation
            </button>

            <button data-page="automod">
                <i class="fa-solid fa-robot"></i>
                AutoMod
            </button>

            <button data-page="economy">
                <i class="fa-solid fa-coins"></i>
                Economy
            </button>

            <button data-page="tickets">
                <i class="fa-solid fa-ticket"></i>
                Tickets
            </button>

            <button data-page="giveaway">
                <i class="fa-solid fa-gift"></i>
                Giveaways
            </button>

            <button data-page="music">
                <i class="fa-solid fa-music"></i>
                Music
            </button>

            <button data-page="analytics">
                <i class="fa-solid fa-chart-line"></i>
                Analytics
            </button>

            <button data-page="settings">
                <i class="fa-solid fa-gear"></i>
                Settings
            </button>

            <button id="ownerPanel" style="display:none;">
                👑 Owner Panel
            </button>

        </nav>

    </aside>

    <main class="content">

        <header>

            <h1>Nexora Dashboard</h1>

            <div class="profile">

                <img id="avatar">

                <span id="username">
                    Loading...
                </span>

            </div>

        </header>

        <div class="server-select">

            <label>Select Server</label>

            <select id="serverSelect">

                <option>
                    Loading...
                </option>

            </select>

        </div>

        <div id="pages">

        </div>

    </main>

</div>

<script src="dashboard.js"></script>

</body>

</html>
